                return cases.filter(c => {
                    if (c.status === 'CLOSED' || !c.extData?.completionDeadline) return false;
                    const deadline = new Date(c.extData.completionDeadline); deadline.setHours(0, 0, 0, 0);
                    const diffDays = Math.ceil((deadline.getTime() - today.getTime()) / (1000 * 60 * 60 * 24));
                    if (diffDays <= 14) { c.noticeType = '2_WEEKS'; c.daysLeft = diffDays; return true; }
                    if (diffDays > 14 && diffDays <= 30) {
                        if (c.extData.dismissedMonthNotice) return false; 
                        c.noticeType = '1_MONTH'; c.daysLeft = diffDays; return true;
                    }
                    return false;
                });
            }, [cases]);

            const dismissClosingNotice = async (e, id) => {
                e.stopPropagation();
                const caseToUpdate = cases.find(c => c.id === id);
                if (!caseToUpdate) return;
                const updatedCase = { ...caseToUpdate, extData: { ...caseToUpdate.extData, dismissedMonthNotice: true } };
                const cleanCase = JSON.parse(JSON.stringify(updatedCase)); 
                setCases(prev => prev.map(c => c.id === id ? cleanCase : c));
                if (window.fbStandaloneDb) { try { const { setDoc, doc } = window.FirebaseModules; await setDoc(doc(window.fbStandaloneDb, 'my_cases', id), cleanCase); } catch (err) {} }
            };

            const handleCreateCase = async (newCase) => {
                const caseId = "CASE" + Date.now().toString() + Math.random().toString(36).substring(2, 6);
                const caseRecord = {
                    id: caseId, caseNumber: newCase.caseNumber || caseId, category: newCase.category || 'OTHER', caseType: newCase.caseType || 'NORMAL',
                    petitioner: { name: newCase.name || '' }, 
                    location: { district: newCase.district || '', address: newCase.address || '' },
                    content: newCase.content || '', status: 'PENDING', createdAt: getLocalISODate(),
                    history: [{ date: getLocalISODate(), author: `系統`, content: '案件建立', type: 'USER' }],
                    extData: newCase.extData || {}
                };
                const cleanRecord = JSON.parse(JSON.stringify(caseRecord)); 
                setCases(prev => sortCases([cleanRecord, ...prev]));
                setView(newCase.caseType === 'SPECIAL' ? 'SPECIAL_LIST' : 'LIST'); 
                setActiveListTab('PROCESSING'); 
                if (window.fbStandaloneDb) { try { const { setDoc, doc } = window.FirebaseModules; await setDoc(doc(window.fbStandaloneDb, 'my_cases', caseId), cleanRecord); } catch (err) { alert("同步失敗！請檢查權限。"); } }
            };

            const handleUpdateBasicInfo = async (id, updates) => {
                const caseToUpdate = cases.find(c => c.id === id);
                if (!caseToUpdate) return;
                const updatedCase = { ...caseToUpdate, ...updates };
                const cleanCase = JSON.parse(JSON.stringify(updatedCase)); 
                setCases(prevCases => sortCases(prevCases.map(c => c.id === id ? cleanCase : c)));
                setSelectedCase(cleanCase);
                if (window.fbStandaloneDb) {
                    try {
                        const { setDoc, doc } = window.FirebaseModules;
                        await setDoc(doc(window.fbStandaloneDb, 'my_cases', id), cleanCase);
                    } catch (err) { 
                        alert("⚠️ 雲端同步被拒絕！請前往 Firebase Console -> Firestore Database -> Rules 將規則改為 allow read, write: if true;");
                    }
                }
            };

            const handleUpdateStatus = async (id, newStatus, replyText, newExtData) => {
                const caseToUpdate = cases.find(c => c.id === id);
                if (!caseToUpdate) return;
                let updatedHistory = caseToUpdate.history;
                if (replyText) updatedHistory = [...caseToUpdate.history, { date: getLocalISODate(), author: '承辦人員', content: replyText, type: 'STAFF' }];
                const updatedCase = { ...caseToUpdate, status: newStatus, history: updatedHistory, extData: newExtData ? { ...caseToUpdate.extData, ...newExtData } : caseToUpdate.extData };
                const cleanCase = JSON.parse(JSON.stringify(updatedCase)); 
                setCases(prevCases => sortCases(prevCases.map(c => c.id === id ? cleanCase : c)));
                setSelectedCase(cleanCase);
                if (window.fbStandaloneDb) { try { const { setDoc, doc } = window.FirebaseModules; await setDoc(doc(window.fbStandaloneDb, 'my_cases', id), cleanCase); } catch (err) { alert("同步被拒絕！"); } }
            };

            const handleEditHistory = async (id, historyIdx, newContent) => {
                const caseToUpdate = cases.find(c => c.id === id);
                if (!caseToUpdate) return;
                let updatedHistory = [...caseToUpdate.history];
                updatedHistory[historyIdx] = { ...updatedHistory[historyIdx], content: newContent };
                const updatedCase = { ...caseToUpdate, history: updatedHistory };
                const cleanCase = JSON.parse(JSON.stringify(updatedCase));
                setCases(prevCases => sortCases(prevCases.map(c => c.id === id ? cleanCase : c)));
                setSelectedCase(cleanCase);
                if (window.fbStandaloneDb) { try { const { setDoc, doc } = window.FirebaseModules; await setDoc(doc(window.fbStandaloneDb, 'my_cases', id), cleanCase); } catch (err) { alert("同步被拒絕！"); } }
            };

            const handleDeleteCase = async (id) => {
                const deletedCase = cases.find(c => c.id === id);
                const returnView = deletedCase?.caseType === 'SPECIAL' ? 'SPECIAL_LIST' : 'LIST';
                setCases(prevCases => prevCases.filter(c => c.id !== id));
                setSelectedCase(null); 
                setView(returnView);
                if (window.fbStandaloneDb) { try { const { deleteDoc, doc } = window.FirebaseModules; await deleteDoc(doc(window.fbStandaloneDb, 'my_cases', id)); } catch (err) { alert("雲端刪除失敗！"); } }
            };

            // --- 匯出 Excel 功能 ---
            const handleExportExcel = () => {
                try {
                    const normalCases = cases.filter(c => c.caseType !== 'SPECIAL');
                    const specialCases = cases.filter(c => c.caseType === 'SPECIAL');

                    const normalData = normalCases.map(c => ({
                        '案件類別': c.category === 'SURVEY' ? '會勘' : c.category === 'REPLY' ? '回復' : c.category === 'A1' ? 'A1事故' : '其他',
                        '案件狀態': c.status === 'CLOSED' ? '已結案' : '辦理中',
                        '收件日期': c.extData?.receiveDate || '',
                        '會勘/回復日': c.extData?.surveyDate || c.extData?.replyDate || '',
                        '案件地點': c.location?.address || '',
                        '負責承辦人': c.extData?.assignee || '',
                        '陳情人': c.petitioner?.name || '',
                        '陳情內容': c.content || '',
                        '相關文號': c.extData?.surveyDocNo || c.extData?.replyDocNo || '',
                        '預定結案期限': c.extData?.completionDeadline || '',
                        '派工日期': c.extData?.dispatchDate || '',
                        '實際完工日': c.extData?.completionDate || '',
                        '備註事項': c.extData?.note || '',
                        '系統編號': c.id || ''
                    }));

                    const specialData = specialCases.map(c => ({
                        '案件類別': c.category === 'DIRECTOR' ? '局長案' : c.category === 'TEMP' ? '臨時交辦' : '其他',
                        '案件狀態': c.status === 'CLOSED' ? '已結案' : '辦理中',
                        '收件日期': c.extData?.receiveDate || '',
                        '交辦時間': c.extData?.assignDate || '',
                        '負責承辦人': c.extData?.assignee || '',
                        '交辦內容': c.content || '',
                        '預定結案期限': c.extData?.completionDeadline || '',
                        '實際結案時間': c.extData?.completionDate || '',
                        '備註事項': c.extData?.note || '',
                        '系統編號': c.id || ''
                    }));

                    const wsNormal = XLSX.utils.json_to_sheet(normalData);
                    const wsSpecial = XLSX.utils.json_to_sheet(specialData);

                    wsNormal['!cols'] = [
                        { wch: 12 }, { wch: 12 }, { wch: 15 }, { wch: 15 }, 
                        { wch: 40 }, { wch: 15 }, { wch: 15 }, { wch: 60 }, 
                        { wch: 25 }, { wch: 15 }, { wch: 15 }, { wch: 15 }, 
                        { wch: 40 }, { wch: 20 }
                    ];

                    wsSpecial['!cols'] = [
                        { wch: 12 }, { wch: 12 }, { wch: 15 }, { wch: 15 }, 
                        { wch: 15 }, { wch: 60 }, { wch: 15 }, { wch: 15 }, 
                        { wch: 40 }, { wch: 20 }
                    ];

                    const wb = XLSX.utils.book_new();
                    XLSX.utils.book_append_sheet(wb, wsNormal, "一般案件");
                    if (specialCases.length > 0) {
                        XLSX.utils.book_append_sheet(wb, wsSpecial, "特殊交辦案件");
                    }

                    XLSX.writeFile(wb, `列管案件清單_${getLocalISODate()}.xlsx`);
                    setShowSettings(false);
                } catch (error) {
                    console.error(error);
                    alert("匯出 Excel 失敗，請確認已載入相關模組。");
                }
            };

            const handleExportBackup = () => {
                const dataStr = JSON.stringify(cases, null, 2);
                const blob = new Blob([dataStr], { type: 'application/json' });
                const url = URL.createObjectURL(blob);
                const link = document.createElement('a');
                link.href = url;
                link.download = `案件備份檔_${getLocalISODate()}.json`;
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
                setShowSettings(false);
            };

            const handleImportBackup = async (e) => {
                const file = e.target.files[0];
                if (!file) return;

                const reader = new FileReader();
                reader.onload = async (event) => {
                    try {
                        const importedCases = JSON.parse(event.target.result);
                        if (!Array.isArray(importedCases)) throw new Error("檔案格式不正確，必須是有效的備份檔。");

                        if (!window.confirm(`確定要匯入 ${importedCases.length} 筆案件嗎？\n這將會覆寫雲端上同編號的現有資料！`)) return;

                        if (window.fbStandaloneDb) {
                            const { setDoc, doc } = window.FirebaseModules;
                            let successCount = 0;
                            for (const c of importedCases) {
                                if (c.id) {
                                    await setDoc(doc(window.fbStandaloneDb, 'my_cases', c.id), c);
                                    successCount++;
                                }
                            }
                            alert(`✅ 成功匯入並同步 ${successCount} 筆案件資料！\n(系統將自動刷新列表)`);
                        } else {
                            alert("⚠️ 尚未連線至雲端，目前僅匯入至本機暫存！");
                            const newCasesMap = new Map(cases.map(c => [c.id, c]));
                            importedCases.forEach(c => {
                                if (c.id) newCasesMap.set(c.id, c);
                            });
                            setCases(sortCases(Array.from(newCasesMap.values())));
                        }
                    } catch (err) {
                        alert("❌ 匯入失敗：\n" + err.message);
                    }
                };
                reader.readAsText(file);
                e.target.value = ''; 
                setShowSettings(false);
            };

            const totalNotices = overdueCases.length + closingNotices.length;

            return (
                <div className="h-[100dvh] w-screen overflow-hidden flex flex-col md:flex-row bg-surface">
                    <aside className="hidden md:flex w-72 bg-white border-r border-slate-100 flex-col shrink-0 z-20">
                        <div className="p-8 pb-4">
                            <div className="w-12 h-12 bg-primary text-white rounded-2xl flex items-center justify-center mb-6 shadow-float"><Icons.Folder /></div>
                            <h1 className="text-2xl font-black tracking-tight text-slate-800">列管案件管理</h1>
                            <div className="text-xs mt-2 text-slate-400 font-bold uppercase tracking-widest">交管系統</div>
                        </div>
                        <nav className="flex-1 p-5 space-y-3 mt-2">
                            <button onClick={() => setView('LIST')} className={`w-full flex items-center gap-3 px-5 py-4 rounded-2xl transition-all font-bold text-sm ${view === 'LIST' ? 'bg-indigo-50 text-primary shadow-sm' : 'text-slate-500 hover:bg-slate-50 hover:text-slate-800'}`}><Icons.List /> 案件清單</button>
                            <button onClick={() => setView('SPECIAL_LIST')} className={`w-full flex items-center gap-3 px-5 py-4 rounded-2xl transition-all font-bold text-sm ${view === 'SPECIAL_LIST' ? 'bg-red-500 text-white shadow-md' : 'bg-red-50 text-red-600 hover:bg-red-100'}`}><Icons.Alert /> 特殊交辦案件</button>
                        </nav>
                        <div className="p-6 pb-8 space-y-3">
                             <button onClick={() => setView('CREATE')} className="w-full flex items-center justify-center gap-2 bg-slate-800 hover:bg-slate-900 text-white py-4 rounded-2xl font-bold shadow-float transition-transform active:scale-95"><Icons.Plus /> 新增一般案件</button>
                            <button onClick={() => setView('CREATE_SPECIAL')} className="w-full flex items-center justify-center gap-2 bg-red-600 hover:bg-red-700 text-white py-4 rounded-2xl font-bold shadow-float transition-transform active:scale-95"><Icons.Star /> 新增特殊交辦</button>
                        </div>
                    </aside>
                    <div className="md:hidden fixed bottom-0 left-0 right-0 bg-white/80 backdrop-blur-lg border-t border-slate-100 flex justify-around items-center px-4 py-2 z-bottom-nav pb-safe shadow-[0_-10px_40px_rgba(0,0,0,0.05)]">
                        <button onClick={() => setView('LIST')} className={`flex flex-col items-center p-3 rounded-2xl transition-colors ${view === 'LIST' ? 'text-primary bg-indigo-50' : 'text-slate-400'}`}><Icons.List /></button>
                        <button onClick={() => setView('SPECIAL_LIST')} className={`flex flex-col items-center p-3 rounded-2xl transition-colors ${view === 'SPECIAL_LIST' ? 'text-red-600 bg-red-50' : 'text-red-400'}`}><Icons.Alert /></button>
                        <button onClick={() => setView(view === 'SPECIAL_LIST' ? 'CREATE_SPECIAL' : 'CREATE')} className={`flex flex-col items-center p-4 -mt-10 rounded-full text-white shadow-float active:scale-95 transition-transform border-4 border-surface ${view === 'SPECIAL_LIST' ? 'bg-red-600' : 'bg-slate-800'}`}><Icons.Plus /></button>
                    </div>
                    <main className="flex-1 flex flex-col min-w-0 mb-16 md:mb-0 h-full overflow-hidden relative">
                        <header className="bg-transparent px-6 md:px-10 py-6 flex justify-between items-center z-[60] shrink-0">
                            <h2 className="text-2xl font-black text-slate-800 tracking-tight">{view === 'LIST' && '案件清單總覽'}{view === 'SPECIAL_LIST' && '特殊交辦清單'}{view === 'CREATE' && '建立一般案件'}{view === 'CREATE_SPECIAL' && '建立特殊交辦'}{view === 'DETAIL' && (selectedCase?.caseType === 'SPECIAL' ? '特殊交辦處理進度' : '案件處理進度')}</h2>
                            <div className="flex items-center gap-3">
                                <div className="hidden md:flex items-center gap-2 px-3 py-1.5 rounded-full bg-white shadow-soft text-xs font-bold border border-slate-100">{syncStatus === 'CONNECTING' && <><span className="w-2 h-2 rounded-full bg-amber-400 animate-pulse"></span><span className="text-slate-500">連線中...</span></>}{syncStatus === 'SYNCED' && <><span className="w-2 h-2 rounded-full bg-emerald-500"></span><span className="text-emerald-700">雲端已同步</span></>}{syncStatus === 'ERROR' && <><span className="w-2 h-2 rounded-full bg-red-500"></span><span className="text-red-600">本機暫存 (被阻擋)</span></>}</div>
                                
                                {/* Notifications Bell */}
                                <div className="relative">
                                    <button onClick={() => { setShowNotifications(!showNotifications); setShowSettings(false); }} className={`relative p-3 rounded-2xl transition-all ${showNotifications ? 'bg-indigo-100 text-primary shadow-inner' : 'bg-white text-slate-400 shadow-soft hover:text-primary hover:bg-indigo-50'}`}><Icons.Bell />{totalNotices > 0 && (<span className="absolute -top-1 -right-1 w-5 h-5 bg-red-500 text-white text-[10px] font-black rounded-full flex items-center justify-center border-2 border-white shadow-sm">{totalNotices}</span>)}</button>
                                    {showNotifications && (
                                        <>
                                            <div className="fixed inset-0 z-40" onClick={() => setShowNotifications(false)}></div>
                                            <div className="absolute right-0 mt-3 w-[calc(100vw-3rem)] md:w-96 bg-white rounded-3xl shadow-float border border-slate-100 overflow-hidden z-50 animate-fade-in origin-top-right flex flex-col max-h-[80vh]">
                                                {overdueCases.length > 0 && (
                                                    <div className="flex-shrink-0">
                                                        <div className="bg-rose-50/50 px-5 py-4 border-b border-rose-100"><h3 className="font-black text-rose-700 text-sm flex items-center gap-2"><Icons.Alert /> 取號逾期 / 今日到期 ({overdueCases.length})</h3></div>
                                                        <div className="max-h-[600px] overflow-y-auto divide-y divide-slate-50 bg-white">
                                                            {overdueCases.map(c => (
                                                                <div key={c.id} onClick={() => { handleSelectCase(c); setShowNotifications(false); }} className="p-5 hover:bg-rose-50/30 cursor-pointer transition-colors group"><div className="font-bold text-slate-800 text-sm group-hover:text-rose-600 transition-colors mb-2 leading-snug">{c.location?.district} - {c.location?.address}</div><div className="text-xs flex justify-between items-center"><span className="bg-slate-100 text-slate-500 px-2 py-1 rounded-md font-medium">期限: {c.extData.recordDeadline}</span><span className={`${c.isToday ? 'text-amber-500' : 'text-rose-500'} font-bold flex items-center gap-1`}>{c.isToday ? '今日到期' : '已逾期'}</span></div></div>
                                                            ))}
                                                        </div>
                                                    </div>
                                                )}
                                                {closingNotices.length > 0 && (
                                                    <div className="flex-shrink-0 border-t border-slate-100">
                                                        <div className="bg-amber-50/50 px-5 py-4 border-b border-amber-100"><h3 className="font-black text-amber-700 text-sm flex items-center gap-2"><Icons.Clock /> 結案即將到期 ({closingNotices.length})</h3></div>
                                                        <div className="max-h-[600px] overflow-y-auto divide-y divide-slate-50 bg-white">
                                                            {closingNotices.map(c => (
                                                                <div key={c.id} onClick={() => { handleSelectCase(c); setShowNotifications(false); }} className="p-5 hover:bg-amber-50/30 cursor-pointer transition-colors group relative">{c.noticeType === '1_MONTH' && (<button onClick={(e) => dismissClosingNotice(e, c.id)} className="absolute top-4 right-4 text-slate-300 hover:text-slate-600 hover:bg-slate-100 rounded-full w-7 h-7 flex items-center justify-center font-bold transition-colors z-10">✕</button>)}<div className="font-bold text-slate-800 text-sm group-hover:text-amber-600 transition-colors pr-8 mb-2 leading-snug">{c.location?.district} - {c.location?.address}</div><div className="text-xs flex justify-between items-center"><span className="bg-slate-100 text-slate-500 px-2 py-1 rounded-md font-medium">期限: {c.extData.completionDeadline}</span><span className={`${c.noticeType === '2_WEEKS' ? 'text-rose-500' : 'text-amber-500'} font-bold flex items-center gap-1`}>{c.daysLeft < 0 ? '已逾期' : `剩餘 ${c.daysLeft} 天`}</span></div></div>
                                                            ))}
                                                        </div>
                                                    </div>
                                                )}
                                                {totalNotices === 0 && (<div className="p-10 text-center flex flex-col items-center gap-3"><div className="w-12 h-12 bg-emerald-50 text-emerald-500 rounded-full flex items-center justify-center"><Icons.Check /></div><span className="text-sm text-slate-400 font-bold">目前無任何待辦通知 🎉</span></div>)}
                                            </div>
                                        </>
                                    )}
                                </div>

                                {/* Settings Menu */}
                                <div className="relative">
                                    <button onClick={() => { setShowSettings(!showSettings); setShowNotifications(false); }} className={`relative p-3 rounded-2xl transition-all ${showSettings ? 'bg-indigo-100 text-primary shadow-inner' : 'bg-white text-slate-400 shadow-soft hover:text-primary hover:bg-indigo-50'}`}><Icons.Settings /></button>
                                    {showSettings && (
                                        <>
                                            <div className="fixed inset-0 z-40" onClick={() => setShowSettings(false)}></div>
                                            <div className="absolute right-0 mt-3 w-64 bg-white rounded-3xl shadow-float border border-slate-100 overflow-hidden z-50 animate-fade-in origin-top-right flex flex-col">
                                                <div className="bg-slate-50/50 px-5 py-4 border-b border-slate-100">
                                                    <h3 className="font-black text-slate-700 text-sm flex items-center gap-2">資料管理與設定</h3>
                                                </div>
                                                <div className="p-2 flex flex-col gap-1">
                                                    <button onClick={handleExportExcel} className="flex items-center gap-3 px-4 py-3 text-sm font-bold text-emerald-600 hover:bg-emerald-50 rounded-xl transition-colors">
                                                        <Icons.FileExcel /> 匯出 Excel 報表
                                                    </button>
                                                    <div className="h-px bg-slate-100 my-1 mx-2"></div>
                                                    <button onClick={handleExportBackup} className="flex items-center gap-3 px-4 py-3 text-sm font-bold text-indigo-600 hover:bg-indigo-50 rounded-xl transition-colors">
                                                        <Icons.Download /> 下載備份檔 (.json)
                                                    </button>
                                                    <label className="flex items-center gap-3 px-4 py-3 text-sm font-bold text-amber-600 hover:bg-amber-50 rounded-xl transition-colors cursor-pointer">
                                                        <Icons.Upload /> 匯入備份檔 (.json)
                                                        <input type="file" accept=".json" className="hidden" onChange={handleImportBackup} />
                                                    </label>
                                                </div>
                                            </div>
                                        </>
                                    )}
                                </div>
                            </div>
                        </header>
                        <div className="flex-1 px-4 md:px-10 pb-4 md:pb-10 overflow-hidden flex flex-col">
                            {view === 'LIST' && <CaseList cases={cases} onSelectCase={handleSelectCase} activeTab={activeListTab} onTabChange={setActiveListTab} config={config} isSpecialMode={false} />}
                            {view === 'SPECIAL_LIST' && <CaseList cases={cases} onSelectCase={handleSelectCase} activeTab={activeListTab} onTabChange={setActiveListTab} config={config} isSpecialMode={true} />}
                            {view === 'CREATE' && <CaseForm onSubmit={handleCreateCase} onCancel={() => setView('LIST')} isSpecialMode={false} />}
                            {view === 'CREATE_SPECIAL' && <CaseForm onSubmit={handleCreateCase} onCancel={() => setView('SPECIAL_LIST')} isSpecialMode={true} />}
                            {view === 'DETAIL' && selectedCase && <CaseDetail caseData={selectedCase} onBack={() => setView(selectedCase.caseType === 'SPECIAL' ? 'SPECIAL_LIST' : 'LIST')} onUpdateStatus={handleUpdateStatus} onDelete={handleDeleteCase} onEditHistory={handleEditHistory} onUpdateBasicInfo={handleUpdateBasicInfo} />}
                        </div>
                    </main>
                </div>
            );
        };

        const App = () => { return <CaseManagementSystem />; };
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
